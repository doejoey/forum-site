<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cerbium Forum</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui;
      background: #0f172a;
      color: #e2e8f0;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: bold;
    }

    .topic {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .user {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      opacity: 0.8;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #334155;
    }
  </style>
</head>

<body>

<h1>Cerbium</h1>

<h2>Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="username" placeholder="Username">
<input id="avatar" placeholder="Avatar URL (optional)">
<button onclick="register()">Register</button>

<h2>Login</h2>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<h2>Create Topic</h2>
<input id="title" placeholder="Title">
<textarea id="content" placeholder="Content"></textarea>
<button onclick="createTopic()">Post Topic</button>

<h2>Topics</h2>
<div id="topics"></div>

<script>
const supabase = window.supabase.createClient(
  "https://oemorffqkzzrekogbhpl.supabase.co",
  "YOUR_ANON_KEY"
);

window.register = async function () {
  const email = email.value;
  const password = password.value;
  const username = document.getElementById("username").value;
  const avatar = document.getElementById("avatar").value;

  const { data, error } = await supabase.auth.signUp({ email, password });

  if (error) return alert(error.message);

  const user = data.user;

  await supabase.from("profiles").insert({
    id: user.id,
    username,
    avatar_url: avatar
  });

  alert("Registered!");
};

window.login = async function () {
  const email = email.value;
  const password = password.value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);
  alert("Logged in!");
};

window.logout = async function () {
  await supabase.auth.signOut();
  alert("Logged out");
};

window.createTopic = async function () {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return alert("You must be logged in");

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  const { error } = await supabase.from("topics").insert({
    title,
    content,
    author_id: profile.id
  });

  if (error) return alert(error.message);

  loadTopics();
};

async function loadTopics() {
  const { data } = await supabase
    .from("topics")
    .select("*, profiles(username, avatar_url)")
    .order("created_at", { ascending: false });

  const div = document.getElementById("topics");
  div.innerHTML = "";

  data?.forEach(t => {
    div.innerHTML += `
      <div class="topic">
        <div class="user">
          <div class="avatar"></div>
          <strong>${t.profiles?.username || "Unknown"}</strong>
        </div>
        <h3>${t.title}</h3>
        <p>${t.content}</p>
      </div>
    `;
  });
}

loadTopics();
</script>

</body>
</html>
