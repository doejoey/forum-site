<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Forum</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    input, textarea, button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
    }

    .topic {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>My Forum</h1>

<h2>Register / Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<h2>Create Topic</h2>

<input id="title" placeholder="Topic title">
<textarea id="content" placeholder="Topic content"></textarea>

<button onclick="createTopic()">Post Topic</button>

<h2>Topics</h2>
<div id="topics"></div>

<script>
const supabase = window.supabase.createClient(
  "https://oemorffqkzzrekogbhpl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lbW9yZmZxa3p6cmVrb2diaHBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTEwODksImV4cCI6MjA5NzkyNzA4OX0.JigEIAh4-IEbzVSvEpPKhPEzpGU8-f1Agtm-7TMzAfQ"
);

// REGISTER
async function register() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Registered! Check email if required.");
}

// LOGIN
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Logged in!");
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  alert("Logged out");
}

// CREATE TOPIC
async function createTopic() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("You must be logged in");
    return;
  }

  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;

  const { error } = await supabase
    .from('topics')
    .insert([{ title, content, author_id: user.id }]);

  if (error) {
    alert(error.message);
    return;
  }

  alert("Topic created!");
  loadTopics();
}

// LOAD TOPICS
async function loadTopics() {
  const { data, error } = await supabase
    .from('topics')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const topicsDiv = document.getElementById('topics');
  topicsDiv.innerHTML = '';

  data.forEach(topic => {
    topicsDiv.innerHTML += `
      <div class="topic">
        <h3>${topic.title}</h3>
        <p>${topic.content}</p>
      </div>
    `;
  });
}

loadTopics();
</script>

</body>
</html>
