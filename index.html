<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Forum</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    input, textarea, button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
    }

    .topic {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>My Forum</h1>

<h2>Register / Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<h2>Create Topic</h2>

<input id="title" placeholder="Topic title">
<textarea id="content" placeholder="Topic content"></textarea>

<button onclick="createTopic()">Post Topic</button>

<h2>Topics</h2>
<div id="topics"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const supabase = window.supabase.createClient(
    "https://oemorffqkzzrekogbhpl.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lbW9yZmZxa3p6cmVrb2diaHBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTEwODksImV4cCI6MjA5NzkyNzA4OX0.JigEIAh4-IEbzVSvEpPKhPEzpGU8-f1Agtm-7TMzAfQ"
  );

  window.register = async function () {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) return alert(error.message);
    alert("Registered!");
  };

  window.login = async function () {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) return alert(error.message);
    alert("Logged in!");
  };

  window.logout = async function () {
    await supabase.auth.signOut();
    alert("Logged out");
  };

  window.createTopic = async function () {
    const { data: { user } } = await supabase.auth.getUser();

    if (!user) return alert("Login first");

    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;

    const { error } = await supabase
      .from('topics')
      .insert([{ title, content, author_id: user.id }]);

    if (error) return alert(error.message);

    alert("Topic created!");
    loadTopics();
  };

  async function loadTopics() {
    const { data } = await supabase
      .from('topics')
      .select('*')
      .order('created_at', { ascending: false });

    const div = document.getElementById('topics');
    div.innerHTML = '';

    data?.forEach(t => {
      div.innerHTML += `
        <div class="topic">
          <h3>${t.title}</h3>
          <p>${t.content}</p>
        </div>
      `;
    });
  }

  loadTopics();

});
</script>

</body>
</html>
