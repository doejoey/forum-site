<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cerbium Forum</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #60a5fa;
    }

    h2 {
      margin-top: 30px;
      color: #93c5fd;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    .topic {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .topic h3 {
      margin: 0 0 5px 0;
      color: #60a5fa;
    }

    .topic p {
      margin: 0;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

<h1>Cerbium Forum</h1>

<h2>Register / Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<h2>Create Topic</h2>

<input id="title" placeholder="Topic title">
<textarea id="content" placeholder="Topic content"></textarea>

<button onclick="createTopic()">Post Topic</button>

<h2>Topics</h2>
<div id="topics"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const supabase = window.supabase.createClient(
    "https://oemorffqkzzrekogbhpl.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lbW9yZmZxa3p6cmVrb2diaHBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNTEwODksImV4cCI6MjA5NzkyNzA4OX0.JigEIAh4-IEbzVSvEpPKhPEzpGU8-f1Agtm-7TMzAfQ"
  );

  window.register = async function () {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { error } = await supabase.auth.signUp({ email, password });

    if (error) return alert(error.message);
    alert("Registered! Check your email.");
  };

  window.login = async function () {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) return alert(error.message);
    alert("Logged in!");
  };

  window.logout = async function () {
    await supabase.auth.signOut();
    alert("Logged out!");
  };

  window.createTopic = async function () {
    const { data: { user } } = await supabase.auth.getUser();

    if (!user) return alert("Login first");

    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;

    const { error } = await supabase
      .from('topics')
      .insert([{ title, content, author_id: user.id }]);

    if (error) return alert(error.message);

    alert("Topic created!");
    loadTopics();
  };

  async function loadTopics() {
    const { data } = await supabase
      .from('topics')
      .select('*')
      .order('created_at', { ascending: false });

    const div = document.getElementById('topics');
    div.innerHTML = '';

    data?.forEach(t => {
      div.innerHTML += `
        <div class="topic">
          <h3>${t.title}</h3>
          <p>${t.content}</p>
        </div>
      `;
    });
  }

  loadTopics();

});
</script>

</body>
</html>
